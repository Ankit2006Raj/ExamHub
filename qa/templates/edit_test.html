{% extends 'base.html' %}
{% block title %}Edit Test — ExamHub{% endblock %}
{% block body %}
<div class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
    <div class="w-full max-w-2xl">
        <div class="flex items-center gap-3 mb-6">
            <a href="{% url 'admin_dashboard' %}" class="text-slate-500 hover:text-slate-800 transition text-sm">← Back to Dashboard</a>
        </div>
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6">Edit Test</h1>
            {% if messages %}
            {% for message in messages %}
            <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Test Name</label>
                    <input type="text" name="test_name" value="{{ test.name }}" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description</label>
                    <textarea name="test_description" rows="3" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 resize-none">{{ test.description }}</textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Start Time</label>
                        <input type="datetime-local" name="start_time" value="{{ test.start_time|date:'Y-m-d' }}T{{ test.start_time|time:'H:i' }}" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">End Time</label>
                        <input type="datetime-local" name="end_time" value="{{ test.end_time|date:'Y-m-d' }}T{{ test.end_time|time:'H:i' }}" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Duration (minutes)</label>
                        <input type="number" name="duration_minutes" value="{{ test.duration_minutes }}" min="1" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Passing Marks <span class="text-slate-400 font-normal">(0 = no threshold)</span></label>
                        <input type="number" name="passing_marks" value="{{ test.passing_marks }}" min="0" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800">
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" name="is_active" id="is_active" {% if test.is_active %}checked{% endif %} class="w-4 h-4 text-indigo-600 rounded">
                    <label for="is_active" class="text-sm font-semibold text-slate-700">Active (visible to students)</label>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="gradient-bg text-white px-8 py-3 rounded-xl font-semibold hover:opacity-90 transition">Save Changes</button>
                    <a href="{% url 'admin_dashboard' %}" class="bg-slate-100 text-slate-700 px-8 py-3 rounded-xl font-semibold hover:bg-slate-200 transition">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
